# Production overlay for hpo-link (Container & Deployment Hardening Standard v1).
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Expose-only behind the reverse proxy: the base file's published host-port
# mapping is dropped with `ports: !reset []`. `!reset` (not a plain `[]`) is
# REQUIRED because Compose MERGES list fields across `-f` overlays, so `ports: []`
# would NOT drop the base "<host>:8000" mapping and the endpoint would stay
# published on the public IP. The container is reachable only via the proxy.
services:
  hpo-data-init:
    build: !reset null
    image: "${HPO_LINK_IMAGE:?HPO_LINK_IMAGE must be set to ghcr.io/berntpopp/hpo-link@sha256:<digest>}"
    pull_policy: missing
    volumes: !override
      - hpo-reference:/data

  hpo-link:
    build: !reset null
    image: "${HPO_LINK_IMAGE:?HPO_LINK_IMAGE must be set to ghcr.io/berntpopp/hpo-link@sha256:<digest>}"
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    environment:
      HPO_LINK_LOG_LEVEL: INFO
      HPO_LINK_LOG_FORMAT: json
      HPO_LINK_DATA__DATA_DIR: /data
      HPO_LINK_DATA__DB_FILENAME: current/hpo.sqlite
      HPO_LINK_DATA__AUTO_BOOTSTRAP: "false"
      HPO_LINK_DATA__REFRESH_ENABLED: "false"
      HPO_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","hpo-link.genefoundry.org"]'
      GF_HEALTHCHECK_HOST: localhost
    ports: !reset []
    expose:
      - "8000"
    volumes: !override
      - hpo-reference:/data:ro
    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256
    healthcheck: !override
      test: ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=hpo-link,environment=production"
    networks: !override
      - default

volumes: !override
  hpo-reference:
    name: hpo-link_hpo-reference

networks: !override
  default:
    name: hpo-link_default
