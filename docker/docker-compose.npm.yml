# Nginx Proxy Manager deployment. The request-facing app joins the proxy network;
# the data init sidecar joins only the private stack network and exits after
# materializing the committed HPO reference bundle.
#
# docker compose -f docker/docker-compose.npm.yml --env-file .env.docker up -d
name: hpo-link-npm

services:
  hpo-data-init:
    image: ${HPO_LINK_IMAGE:?Set HPO_LINK_IMAGE to ghcr.io/berntpopp/hpo-link@sha256:<digest>}
    pull_policy: missing
    command: ["hpo-link-data", "materialize-data"]
    environment:
      HPO_LINK_IMMUTABLE_DATA__REFERENCE_ROOT: /data
      HPO_LINK_IMMUTABLE_DATA__RELEASE_TAG: db-v2026-06-23
      HPO_LINK_IMMUTABLE_DATA__BUNDLE_URL: https://github.com/berntpopp/hpo-link/releases/download/db-v2026-06-23/hpo-2026-06-23.sqlite.zst
      HPO_LINK_IMMUTABLE_DATA__COMPRESSED_SHA256: d677a96efd8c274045241934c33b25dfb6fc9a6414c27bed7ae3334d05d4c9f6
      HPO_LINK_IMMUTABLE_DATA__EXPANDED_TREE_SHA256: f98176204ac9b70d4451efab7fcafa4756e1aac2f14b64a5f2c5ec0d574ebee3
      HPO_LINK_IMMUTABLE_DATA__SCHEMA_VERSION: "1"
      HPO_LINK_IMMUTABLE_DATA__HPO_VERSION: "2026-06-23"
      HPO_LINK_IMMUTABLE_DATA__HPOA_VERSION: "2026-06-23"
      HPO_LINK_IMMUTABLE_DATA__MAX_COMPRESSED_BYTES: "134217728"
      HPO_LINK_IMMUTABLE_DATA__MAX_EXPANDED_BYTES: "536870912"
    volumes:
      - hpo-reference:/data
    networks:
      - hpo_link_internal_net
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  hpo_link:
    image: ${HPO_LINK_IMAGE:?Set HPO_LINK_IMAGE to ghcr.io/berntpopp/hpo-link@sha256:<digest>}
    pull_policy: missing
    container_name: hpo-link-npm
    depends_on:
      hpo-data-init:
        condition: service_completed_successfully
    # No published host ports: NPM routes to this container on the shared network.
    expose:
      - "8000"
    environment:
      - HPO_LINK_HOST=0.0.0.0
      - HPO_LINK_PORT=8000
      - HPO_LINK_TRANSPORT=unified
      - HPO_LINK_MCP_PATH=/mcp
      - 'HPO_LINK_ALLOWED_HOSTS=["localhost","127.0.0.1","::1","hpo-link.genefoundry.org"]'
      - HPO_LINK_LOG_LEVEL=${LOG_LEVEL_API:-INFO}
      - HPO_LINK_LOG_FORMAT=json
      - HPO_LINK_DATA__DATA_DIR=/data
      - HPO_LINK_DATA__DB_FILENAME=current/hpo.sqlite
      - HPO_LINK_DATA__AUTO_BOOTSTRAP=false
      - HPO_LINK_DATA__REFRESH_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    volumes:
      - hpo-reference:/data:ro
    networks:
      - hpo_link_internal_net
      - npm_proxy_network
    deploy:
      resources:
        limits:
          memory: ${HPO_API_MEMORY_LIMIT:-1g}
          cpus: ${HPO_API_CPU_LIMIT:-1.0}
          pids: 256
        reservations:
          memory: 256m
          cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=hpo-link,environment=production,proxy=npm"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

volumes:
  hpo-reference:

networks:
  hpo_link_internal_net:
    driver: bridge
    name: hpo_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
