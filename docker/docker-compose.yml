name: hpo-link

services:
  hpo-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        # Stamp build provenance into the image so get_server_capabilities/_meta
        # can report which build answered. Defaults keep an unset env harmless.
        HPO_LINK_GIT_SHA: ${HPO_LINK_GIT_SHA:-unknown}
        HPO_LINK_BUILT_AT: ${HPO_LINK_BUILT_AT:-}
    container_name: hpo-link
    # Dev/local only — loopback-bound (127.0.0.1) so copying this file to a
    # server never publishes the unauthenticated backend on the public IP
    # (Docker would otherwise bind 0.0.0.0 and bypass the host firewall).
    # Production fronts the container with a reverse proxy via the prod/npm
    # overlays (ports: !reset []). Backends are unauthenticated by design.
    ports:
      - "127.0.0.1:${HPO_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      HPO_LINK_HOST: 0.0.0.0
      HPO_LINK_PORT: 8000
      HPO_LINK_TRANSPORT: unified
      HPO_LINK_MCP_PATH: /mcp
      HPO_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      HPO_LINK_LOG_LEVEL: INFO
      HPO_LINK_LOG_FORMAT: json
      HPO_LINK_DATA__DATA_DIR: /app/data
      HPO_LINK_DATA__AUTO_BOOTSTRAP: "true"
      # Refresh is owned by cron (see docs/deployment.md). To refresh the running
      # container, run a host cron job:
      #   docker compose -f docker/docker-compose.yml exec hpo-link hpo-link-data refresh
      HPO_LINK_DATA__REFRESH_ENABLED: "false"
    volumes:
      # Persist the built SQLite index across container restarts.
      - hpo-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    # Container & Deployment Hardening Standard v1 (backported so running the base
    # file directly is still safe). The built SQLite index lives on the `hpo-data`
    # named volume (writable); the rootfs is read-only and scratch is an explicit,
    # size-capped tmpfs (TMPDIR=/tmp/hpo-link in the image).
    read_only: true
    tmpfs:
      - /tmp/hpo-link:rw,noexec,nosuid,size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    # Limits in both forms: deploy.resources (honored by Compose v2) and the
    # non-swarm keys (honored by legacy docker-compose) so they apply either way.
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hpo-network

  # Optional: a one-shot refresh runner you can invoke from host cron, e.g.
  #   17 3 * * *  docker compose -f /path/docker/docker-compose.yml run --rm refresh
  refresh:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    entrypoint: ["hpo-link-data", "refresh"]
    environment:
      HPO_LINK_DATA__DATA_DIR: /app/data
    volumes:
      - hpo-data:/app/data
    networks:
      - hpo-network

volumes:
  hpo-data:
    driver: local

networks:
  hpo-network:
    driver: bridge
