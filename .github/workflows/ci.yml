name: ci
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group dev
      - run: uv run ruff format --check hpo_link tests server.py mcp_server.py scripts
      - run: uv run ruff check hpo_link tests server.py mcp_server.py scripts
      - run: uv run python scripts/check_file_size.py
      - run: uv run mypy hpo_link server.py mcp_server.py
      - run: uv run python -m pytest tests -q -m "not integration"
